name: Notify Discord on Release
on:
  release:
    types: [published, edited]

jobs:
  discord_notification:
    runs-on: ubuntu-latest
    steps:
      - name: Send Release Info to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RELEASE_BODY: ${{ github.event.release.body }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_URL: ${{ github.event.release.html_url }}
        run: |
          # 1. Construct the JSON payload safely using jq
          # This handles all escaping for you automatically
          PAYLOAD=$(jq -n \
            --arg title "New Release: ${RELEASE_NAME:-$RELEASE_TAG}" \
            --arg url "$RELEASE_URL" \
            --arg desc "$RELEASE_BODY" \
            '{
              embeds: [{
                title: $title,
                url: $url,
                description: $desc,
                color: 5814783,
                footer: { text: "Cephalon Kronos Update" }
              }]
            }')

          # 2. Send the payload
          curl -X POST -H "Content-Type: application/json" \
               -d "$PAYLOAD" \
               "$DISCORD_WEBHOOK"