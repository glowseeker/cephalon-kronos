name: Notify Discord on Release
on:
  release:
    types: [published, edited]

jobs:
  discord_notification:
    runs-on: ubuntu-latest
    steps:
      - name: Send Release Info to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RELEASE_BODY: ${{ github.event.release.body }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_URL: ${{ github.event.release.html_url }}
        run: |
          # Use the environment variable, not the context expression directly
          TITLE="${RELEASE_NAME:-$RELEASE_TAG}"
          URL="$RELEASE_URL"
          
          # Use jq to safely encode the environment variable into a JSON string
          JSON_BODY=$(jq -n --arg body "$RELEASE_BODY" '$body')

          curl -H "Content-Type: application/json" \
               -d "{
                 \"embeds\": [{
                   \"title\": \"New Release: $TITLE\",
                   \"url\": \"$URL\",
                   \"description\": $JSON_BODY,
                   \"color\": 5814783,
                   \"footer\": { \"text\": \"Cephalon Kronos Update\" }
                 }]
               }" \
               $DISCORD_WEBHOOK