name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout API helper
        uses: actions/checkout@v4
        with:
          repository: Obsidian-Jackal/warframe-api-helper
          path: helper-src
          submodules: recursive

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo add-apt-repository -y ppa:pipewire-debian/pipewire-upstream
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            build-essential \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            clang \
            lld \
            libasound2-dev \
            libssl-dev \
            libdbus-1-dev \
            libpango1.0-dev \
            libcairo2-dev \
            libarchive-dev \
            libicu-dev \
            libcap-dev \
            libpipewire-0.3-dev

      - name: Build API Helper (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        working-directory: helper-src
        run: |
          SOUP_DIR="Soup/soup"
          BIN_DIR="bin/int"
          mkdir -p "$BIN_DIR" bin
          for f in "$SOUP_DIR"/*.cpp; do
            clang++ -std=c++20 -fno-rtti -O3 -fPIE -ffunction-sections -fdata-sections -DSOUP_STANDALONE -c "$f" -o "$BIN_DIR/$(basename "${f%.cpp}").o" -I"$SOUP_DIR"
          done
          ar rcs libsoup.a "$BIN_DIR"/*.o
          clang++ -std=c++20 -fno-rtti -O3 -fPIE -ffunction-sections -fdata-sections -DSOUP_STANDALONE -fuse-ld=lld -Wl,--gc-sections,--icf=safe -c main.cpp -o "$BIN_DIR/main.o" -I"$SOUP_DIR"
          clang++ -std=c++20 -fno-rtti -O3 -fPIE -fuse-ld=lld -Wl,--gc-sections,--icf=safe "$BIN_DIR/main.o" libsoup.a -lstdc++ -pthread -lm -ldl -lresolv -lstdc++fs -o bin/warframe-api-helper
          strip bin/warframe-api-helper

      - name: Build API Helper (macOS)
        if: matrix.platform == 'macos-latest'
        working-directory: helper-src
        run: |
          SOUP_DIR="Soup/soup"
          BIN_DIR="bin/int"
          mkdir -p "$BIN_DIR" bin
          for f in "$SOUP_DIR"/*.cpp; do
            clang++ -std=c++20 -fno-rtti -O3 -fPIE -ffunction-sections -fdata-sections -DSOUP_STANDALONE -c "$f" -o "$BIN_DIR/$(basename "${f%.cpp}").o" -I"$SOUP_DIR"
          done
          ar rcs libsoup.a "$BIN_DIR"/*.o
          clang++ -std=c++20 -fno-rtti -O3 -fPIE -ffunction-sections -fdata-sections -DSOUP_STANDALONE -c main.cpp -o "$BIN_DIR/main.o" -I"$SOUP_DIR"
          clang++ -std=c++20 -fno-rtti -O3 -fPIE -Wl,-dead_strip "$BIN_DIR/main.o" libsoup.a -lc++ -pthread -o bin/warframe-api-helper
          strip bin/warframe-api-helper

      - name: Build API Helper (Windows)
        if: matrix.platform == 'windows-latest'
        working-directory: helper-src
        shell: bash
        run: |
          SOUP_DIR="Soup/soup"
          BIN_DIR="bin/int"
          mkdir -p "$BIN_DIR" bin
          for f in "$SOUP_DIR"/*.cpp; do
            clang++ -std=c++20 -fno-rtti -O3 -ffunction-sections -fdata-sections -DSOUP_STANDALONE -D_WIN32_WINNT=0x0601 -c "$f" -o "$BIN_DIR/$(basename "${f%.cpp}").o" -I"$SOUP_DIR"
          done
          ar rcs libsoup.a "$BIN_DIR"/*.o
          clang++ -std=c++20 -fno-rtti -O3 -ffunction-sections -fdata-sections -DSOUP_STANDALONE -D_WIN32_WINNT=0x0601 -c main.cpp -o "$BIN_DIR/main.o" -I"$SOUP_DIR"
          clang++ -std=c++20 -fno-rtti -O3 -Wl,--gc-sections "$BIN_DIR/main.o" libsoup.a -static-libgcc -static-libstdc++ -liphlpapi -ldnsapi -lbcrypt -lsetupapi -lgdi32 -lhid -lws2_32 -lwsock32 -o bin/warframe-api-helper.exe

      - name: Build and Bundle Portable Tesseract (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr
          mkdir -p src-tauri/data/bin
          # Copy the binary
          cp $(which tesseract) src-tauri/data/bin/tesseract
          # Copy all shared library dependencies (.so files), resolving symlinks to real files
          ldd $(which tesseract) | grep "=> /" | awk '{print $3}' | xargs -I {} readlink -f {} | xargs -I {} cp -L {} src-tauri/data/bin/
          chmod +x src-tauri/data/bin/tesseract

      - name: Install and copy Tesseract (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          brew install tesseract dylibbundler
          mkdir -p src-tauri/data/bin
          cp $(which tesseract) src-tauri/data/bin/tesseract
          chmod +x src-tauri/data/bin/tesseract
          dylibbundler -b -x src-tauri/data/bin/tesseract -d src-tauri/data/bin/ -p @executable_path/

      - name: Build and Bundle Portable Tesseract (Windows)
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          curl.exe -L -A "Mozilla/5.0" "https://digi.bib.uni-mannheim.de/tesseract/tesseract-ocr-w64-setup-5.3.3.20231005.exe" -o tess_setup.exe
          7z x tess_setup.exe -otess_ext -y
          mkdir -p src-tauri/data/bin
          cp tess_ext/tesseract.exe src-tauri/data/bin/
          # Copy all DLLs recursively — the installer puts libtesseract-5.dll,
          # libleptonica-6.dll, libarchive-13.dll etc. in subdirectories, not root.
          find tess_ext -name "*.dll" -exec cp {} src-tauri/data/bin/ \;
          echo "=== Bundled DLLs ==="
          ls src-tauri/data/bin/*.dll

      - name: Prepare Tauri Binaries Directory
        shell: bash
        run: mkdir -p src-tauri/data/bin

      - name: Copy Helper Binary (Unix)
        if: matrix.platform != 'windows-latest'
        run: cp helper-src/bin/warframe-api-helper src-tauri/data/bin/warframe-api-helper

      - name: Copy Helper Binary (Windows)
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: cp helper-src/bin/warframe-api-helper.exe src-tauri/data/bin/warframe-api-helper.exe

      - name: Install frontend dependencies
        run: pnpm install

      - name: Verify icons (Windows)
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          echo "=== Icon files ==="
          ls -la src-tauri/icons/icon.ico
          file src-tauri/icons/icon.ico
          echo ""
          echo "=== tauri.conf.json icon section ==="
          grep -A 10 '"icon"' src-tauri/tauri.conf.json
          echo ""
          echo "=== CLI version ==="
          npx tauri --version
          echo ""
          echo "=== Rust version ==="
          rustc --version

      - name: Build and Release Tauri app
        uses: tauri-apps/tauri-action@v0.5.25
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUST_BACKTRACE: full
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Cephalon Kronos ${{ github.ref_name }}'
          releaseBody: 'See the attached assets for the release binaries.'
          releaseDraft: true
          prerelease: false
          uploadPlainBinary: true